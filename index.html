<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>我的音乐生涯生成器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 html2canvas 用于生成图片 -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body { background-color: #121212; color: white; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const initialGrid = Array.from({ length: 30 }, (_, index) => ({
            id: index,
            subTitle: `自定义小标题 ${index + 1}`,
            musicData: null
        }));

        function App() {
            const [boardData, setBoardData] = useState({ mainTitle: "我的音乐生涯个人喜好表", author: "作者：你的名字" });
            const [gridItems, setGridItems] = useState(initialGrid);

            const[isModalOpen, setIsModalOpen] = useState(false);
            const [activeCellId, setActiveCellId] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");
            const [searchResults, setSearchResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const[isExporting, setIsExporting] = useState(false); // 导出图片的Loading状态

            const handleTitleChange = (e, field) => setBoardData({ ...boardData, [field]: e.target.value });
            const handleSubTitleChange = (id, newTitle) => {
                setGridItems(items => items.map(item => item.id === id ? { ...item, subTitle: newTitle } : item));
            };

            const openSearchModal = (id) => { setActiveCellId(id); setIsModalOpen(true); };
            const closeSearchModal = () => { setIsModalOpen(false); setSearchQuery(""); setSearchResults([]); };

            // === 核心魔法：无门槛 Apple Music (iTunes) API ===
            const handleSearch = async () => {
                if (!searchQuery) return;
                setIsSearching(true);
                
                try {
                    // iTunes API 完全开放，不需要门票和密钥！
                    const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(searchQuery)}&entity=song&limit=15`);
                    const data = await response.json();

                    const tracks = data.results.map(track => {
                        // 强行把苹果的 100x100 小图替换成 600x600 超清大图！
                        const hdCover = track.artworkUrl100 ? track.artworkUrl100.replace('100x100bb', '600x600bb') : 'https://via.placeholder.com/300';
                        return {
                            title: track.trackName,
                            artist: track.artistName,
                            cover: hdCover
                        };
                    });

                    setSearchResults(tracks);
                } catch (error) {
                    console.error('API Error:', error);
                    alert("搜索出错了，请检查网络！");
                } finally {
                    setIsSearching(false);
                }
            };

            const handleSelectMusic = (music) => {
                setGridItems(items => items.map(item => item.id === activeCellId ? { ...item, musicData: music } : item));
                closeSearchModal();
            };

            const handleRemoveMusic = (id, e) => {
                e.stopPropagation();
                setGridItems(items => items.map(item => item.id === id ? { ...item, musicData: null } : item));
            };

            // === 终极绝招：生成图片并下载 ===
            const handleExportImage = async () => {
                setIsExporting(true);
                const boardElement = document.getElementById('capture-area'); // 选中我们要截图的区域
                
                try {
                    const canvas = await html2canvas(boardElement, {
                        useCORS: true,        // 允许加载跨域的苹果封面图
                        backgroundColor: '#121212', // 设定背景色，防止透明变黑
                        scale: 2              // 清晰度乘以2，保证发朋友圈不糊
                    });
                    
                    // 把画布变成图片链接
                    const imageURL = canvas.toDataURL('image/png');
                    
                    // 模拟点击下载
                    const link = document.createElement('a');
                    link.href = imageURL;
                    link.download = `${boardData.mainTitle}.png`; // 用大标题做文件名
                    link.click();

                } catch (error) {
                    console.error("导出失败:", error);
                    alert("生成图片失败了！");
                } finally {
                    setIsExporting(false);
                }
            };

            return (
                <div className="min-h-screen p-8 font-sans flex flex-col items-center relative pb-24">
                    
                    {/* 这个 div 包裹的区域，就是最后会被截成图片的区域 */}
                    <div id="capture-area" className="w-full max-w-6xl flex flex-col items-center p-8 bg-[#121212] rounded-xl">
                        
                        <div className="w-full text-center mb-8 space-y-4">
                            <input className="bg-transparent text-5xl font-bold text-center w-full focus:outline-none focus:border-b border-gray-600 pb-2 transition-colors" value={boardData.mainTitle} onChange={(e) => handleTitleChange(e, 'mainTitle')} />
                            <input className="bg-transparent text-xl text-gray-400 text-center w-full focus:outline-none" value={boardData.author} onChange={(e) => handleTitleChange(e, 'author')} />
                        </div>

                        <div className="w-full grid grid-cols-6 gap-4 bg-black p-6 rounded-xl shadow-2xl border border-gray-800">
                            {gridItems.map((item) => (
                                <div key={item.id} className="flex flex-col gap-2">
                                    <input className="bg-transparent text-sm text-center text-gray-300 focus:outline-none focus:text-white transition-colors w-full bg-gray-900 rounded px-1 py-1" value={item.subTitle} onChange={(e) => handleSubTitleChange(item.id, e.target.value)} />
                                    
                                    <div onClick={() => openSearchModal(item.id)} className="aspect-square bg-gray-800 rounded-lg flex items-center justify-center border-2 border-dashed border-gray-600 hover:border-blue-500 hover:bg-gray-700 cursor-pointer transition-all group relative overflow-hidden">
                                        {item.musicData ? (
                                            <>
                                                {/* crossOrigin="anonymous" 是为了让 html2canvas 能合法截图 */}
                                                <img src={item.musicData.cover} className="w-full h-full object-cover" crossOrigin="anonymous" />
                                                <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity" data-html2canvas-ignore>
                                                    <button onClick={(e) => handleRemoveMusic(item.id, e)} className="text-white bg-red-600 px-3 py-1 rounded-full text-sm font-bold shadow-lg">删除</button>
                                                </div>
                                            </>
                                        ) : (
                                            <span className="text-4xl text-gray-500 group-hover:text-blue-500 transform group-hover:scale-110 transition-all">+</span>
                                        )}
                                    </div>
                                    
                                    <div className="h-10 flex flex-col items-center justify-center text-xs">
                                        <span className="text-gray-200 truncate w-full text-center font-bold">{item.musicData ? item.musicData.title : "点击添加"}</span>
                                        {item.musicData && <span className="text-gray-500 truncate w-full text-center scale-90">{item.musicData.artist}</span>}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* === 悬浮的导出图片按钮 === */}
                    <button 
                        onClick={handleExportImage}
                        disabled={isExporting}
                        data-html2canvas-ignore
                        className="fixed bottom-10 right-10 bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-400 hover:to-purple-500 text-white font-bold py-4 px-8 rounded-full shadow-[0_0_20px_rgba(59,130,246,0.5)] transform hover:scale-105 transition-all text-lg flex items-center gap-2 disabled:opacity-50"
                    >
                        {isExporting ? '正在生成海报...' : '📸 生成分享图'}
                    </button>

                    {/* 搜索弹窗 */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/80 flex justify-center items-center z-50 p-4 backdrop-blur-sm" data-html2canvas-ignore>
                            <div className="bg-[#181818] w-full max-w-md rounded-xl border border-gray-700 shadow-2xl overflow-hidden flex flex-col">
                                <div className="p-4 border-b border-gray-700 flex justify-between items-center bg-[#222]">
                                    <h3 className="text-xl font-bold text-white flex items-center gap-2">
                                        <span className="w-3 h-3 rounded-full bg-blue-500"></span> 搜索 Apple 曲库
                                    </h3>
                                    <button onClick={closeSearchModal} className="text-gray-400 hover:text-white text-2xl leading-none">&times;</button>
                                </div>
                                <div className="p-4 flex gap-2">
                                    <input type="text" className="flex-1 bg-gray-800 text-white rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="搜索歌手、歌名..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSearch()} />
                                    <button onClick={handleSearch} disabled={isSearching} className="bg-blue-500 hover:bg-blue-400 disabled:bg-blue-800 text-white font-bold px-6 py-2 rounded-full transition-colors min-w-[80px]">
                                        {isSearching ? '...' : '搜索'}
                                    </button>
                                </div>
                                <div className="p-4 flex-1 overflow-y-auto max-h-96 space-y-2">
                                    {searchResults.length === 0 && !isSearching ? (
                                        <div className="text-center text-gray-500 py-8">不用填密钥，随便搜点什么试试！</div>
                                    ) : (
                                        searchResults.map((result, idx) => (
                                            <div key={idx} onClick={() => handleSelectMusic(result)} className="flex items-center gap-4 p-2 hover:bg-[#2a2a2a] rounded-lg cursor-pointer transition-colors border border-transparent hover:border-gray-600">
                                                <img src={result.cover} className="w-14 h-14 rounded-md object-cover shadow-md" crossOrigin="anonymous" />
                                                <div className="flex flex-col overflow-hidden">
                                                    <span className="text-white font-bold truncate">{result.title}</span>
                                                    <span className="text-gray-400 text-sm truncate">{result.artist}</span>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
