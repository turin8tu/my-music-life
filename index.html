<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>我的音乐喜好表</title>


    
    <!-- 不是我干的 -->

    
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 html2canvas -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <!-- 引入 qrious 生成本地二维码 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body { background-color: #f3f4f6; color: #000; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        input:focus { outline: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const presetTitles =[
            "最爱的单曲", "最爱的专辑", "水准最高", "最想安利", "最有特殊意义",
            "最佳前奏", "最佳作词", "最小众的", "最洗脑", "最佳solo",
            "最感同身受", "最被低估", "单曲循环最久", "最治愈", "最震撼",
            "入坑神曲", "冷门佳作", "深夜专属", "运动必备", "旅行必听",
            "最悲伤", "最快乐", "最浪漫", "童年回忆", "最近最爱"
        ];

        const initialGrid = Array.from({ length: 25 }, (_, index) => ({
            id: index,
            subTitle: presetTitles[index] || `自定义标题 ${index + 1}`,
            musicData: null
        }));

        function App() {
            const[boardData, setBoardData] = useState(() => {
                try {
                    const saved = localStorage.getItem('musicBoardData');
                    return saved ? JSON.parse(saved) : { mainTitle: "音乐生涯个人喜好表", author: "作者：（点击修改）" };
                } catch (e) {
                    return { mainTitle: "音乐生涯个人喜好表", author: "作者：（点击修改）" };
                }
            });

            const[gridItems, setGridItems] = useState(() => {
                try {
                    const saved = localStorage.getItem('musicGridItems');
                    return saved ? JSON.parse(saved) : initialGrid;
                } catch (e) {
                    return initialGrid;
                }
            });

            const[windowWidth, setWindowWidth] = useState(window.innerWidth);
            const[scale, setScale] = useState(1);
            const [qrSrc, setQrSrc] = useState("");

            useEffect(() => {
                const qr = new window.QRious({
                    value: 'https://www.turin-musicboard.fun/',
                    size: 800, 
                    level: 'H' 
                });
                setQrSrc(qr.toDataURL('image/png'));
            },[]);

            useEffect(() => {
                const handleResize = () => {
                    const width = window.innerWidth;
                    setWindowWidth(width);
                    const MIN_WIDTH = 1080; 
                    if (width < MIN_WIDTH) {
                        setScale((width - 32) / MIN_WIDTH);
                    } else {
                        setScale(1);
                    }
                };
                handleResize(); 
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            },[]);

            useEffect(() => {
                try { localStorage.setItem('musicBoardData', JSON.stringify(boardData)); } catch (e) {}
            },[boardData]);

            useEffect(() => {
                try { localStorage.setItem('musicGridItems', JSON.stringify(gridItems)); } catch (e) {}
            }, [gridItems]);

            const[isModalOpen, setIsModalOpen] = useState(false);
            const[activeCellId, setActiveCellId] = useState(null);
            const[searchQuery, setSearchQuery] = useState("");
            const[searchResults, setSearchResults] = useState([]);
            const[isSearching, setIsSearching] = useState(false);
            const[isExporting, setIsExporting] = useState(false);

            const[searchType, setSearchType] = useState('song'); 
            const[localTitle, setLocalTitle] = useState("");
            const[localArtist, setLocalArtist] = useState("");
            const[localImageStr, setLocalImageStr] = useState(null);

            const handleTitleChange = (e, field) => setBoardData({ ...boardData, [field]: e.target.value });
            const handleSubTitleChange = (id, newTitle) => {
                setGridItems(items => items.map(item => item.id === id ? { ...item, subTitle: newTitle } : item));
            };

            const openSearchModal = (id) => { setActiveCellId(id); setIsModalOpen(true); };
            const closeSearchModal = () => { setIsModalOpen(false); setSearchQuery(""); setSearchResults([]); setSearchType('song'); setLocalTitle(""); setLocalArtist(""); setLocalImageStr(null); };

            const handleSearch = async () => {
                const cleanQuery = searchQuery.trim();
                if (!cleanQuery) return;
                
                setIsSearching(true);
                try {
                    const entity = searchType === 'song' ? 'song' : 'album';
                    const targetUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(cleanQuery)}&entity=${entity}&country=cn&limit=15`;
                    
                    const data = await new Promise((resolve, reject) => {
                        const callbackName = 'itunes_jsonp_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
                        
                        window[callbackName] = (responseData) => {
                            cleanup();
                            resolve(responseData);
                        };

                        const script = document.createElement('script');
                        script.src = `${targetUrl}&callback=${callbackName}`;
                        
                        const cleanup = () => {
                            delete window[callbackName];
                            if (script.parentNode) script.parentNode.removeChild(script);
                        };

                        script.onerror = () => {
                            cleanup();
                            reject(new Error("网络或防火墙阻断了请求"));
                        };

                        setTimeout(() => {
                            cleanup();
                            reject(new Error("请求超时"));
                        }, 10000);

                        document.body.appendChild(script);
                    });

                    if (!data || !data.results) {
                        throw new Error("无有效数据返回");
                    }

                    const tracks = data.results.map(item => {
                        const hdCover = item.artworkUrl100 
                            ? item.artworkUrl100.replace('100x100bb', '600x600bb') 
                            : 'https://via.placeholder.com/600';
                            
                        return { 
                            title: searchType === 'song' ? item.trackName : item.collectionName, 
                            artist: item.artistName, 
                            cover: hdCover 
                        };
                    }).filter(item => item.title);

                    if (tracks.length === 0) {
                        alert(`没有搜到关于“${cleanQuery}”的内容，可能是由于版权原因未上架，换个词试试？`);
                    }
                    
                    setSearchResults(tracks);
                    
                } catch (error) {
                    console.error("搜索彻底失败:", error);
                    alert("搜索出错了！请检查网络是否连接正常。");
                } finally {
                    setIsSearching(false);
                }
            };

            const handleLocalUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => { setLocalImageStr(event.target.result); };
                reader.readAsDataURL(file);
            };

            const submitLocal = () => {
                if (!localImageStr) { alert("请先选择一张图片哦！"); return; }
                handleSelectMusic({ title: localTitle || "自定义内容", artist: localArtist || "", cover: localImageStr });
            };

            const handleSelectMusic = (music) => {
                setGridItems(items => items.map(item => item.id === activeCellId ? { ...item, musicData: music } : item));
                closeSearchModal();
            };

            const handleRemoveMusic = (id, e) => {
                e.stopPropagation(); 
                setGridItems(items => items.map(item => item.id === id ? { ...item, musicData: null } : item));
            };

            const handleExportImage = () => {
                window.scrollTo({ top: 0, left: 0, behavior: 'instant' });
                setIsExporting(true); 
                
                setTimeout(async () => {
                    const boardElement = document.getElementById('capture-area');
                    try {
                        const canvas = await html2canvas(boardElement, { 
                            useCORS: true, 
                            backgroundColor: '#ffffff', 
                            scale: 2,
                            windowWidth: 1400,
                            scrollY: 0,
                            scrollX: 0
                        });
                        const imageURL = canvas.toDataURL('image/png');
                        const link = document.createElement('a');
                        link.href = imageURL;
                        link.download = `${boardData.mainTitle}.png`;
                        link.click();
                    } catch (error) {
                        alert("生成图片失败了！");
                    } finally {
                        setIsExporting(false); 
                    }
                }, 800); 
            };

            const MIN_WIDTH = 1080;
            const isMobile = windowWidth < MIN_WIDTH;

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans flex flex-col items-center relative pb-24">

                    {isExporting && (
                        <div className="fixed inset-0 bg-white/95 z-[9999] flex flex-col items-center justify-center backdrop-blur-sm" data-html2canvas-ignore>
                            <div className="w-16 h-16 border-4 border-black border-t-transparent rounded-full animate-spin mb-6"></div>
                            <p className="text-2xl font-black tracking-widest text-black mb-2">正在生成高清长图...</p>
                            <p className="text-gray-500 text-sm">正在处理画质排版，请勿滑动屏幕或关闭页面</p>
                        </div>
                    )}

                    <div className="w-full text-center mb-6 mt-2 select-none" data-html2canvas-ignore>
                        <p className="text-[#555] text-xl md:text-4xl tracking-[0.2em] font-light mb-2" style={{ fontFamily: '"Georgia", "Times New Roman", serif' }}>
                            「 生命没有了音乐，就如同是一场错误。 」
                        </p>
                        <p className="text-gray-400 text-xs md:text-lg tracking-widest italic font-light">
                            Ohne Musik wäre das Leben ein Irrtum. — Friedrich Nietzsche
                        </p>
                        <div className="w-12 h-[1px] bg-gray-300 mx-auto mt-4 md:mt-6"></div>
                    </div>
                   
                    <div className={`w-full flex ${isMobile && !isExporting ? 'justify-start' : 'justify-center'} overflow-visible`}>
                        <div id="capture-area" 
                             className="w-full max-w-[1400px] flex flex-col items-center p-8 bg-white shadow-xl rounded-sm"
                             style={{ 
                                width: isExporting ? '1400px' : (isMobile ? `${MIN_WIDTH}px` : undefined),
                                zoom: isExporting ? 1 : scale, 
                                transformOrigin: 'top left',
                                transition: 'zoom 0.3s ease'
                             }}>
                            
                            <div className="w-full text-center mb-10 space-y-4">
                                {isExporting ? (
                                    <div className="text-6xl font-black text-center w-full text-black tracking-wide border-b-2 border-gray-100 pb-4">{boardData.mainTitle}</div>
                                ) : (
                                    <input className="bg-transparent text-6xl font-black text-center w-full focus:outline-none focus:border-b-2 border-gray-100 pb-4 transition-colors text-black tracking-wide" value={boardData.mainTitle} onChange={(e) => handleTitleChange(e, 'mainTitle')} />
                                )}
                                
                                {isExporting ? (
                                    <div className="text-2xl text-gray-500 font-medium tracking-wide text-center w-full pt-2">{boardData.author}</div>
                                ) : (
                                    <input className="bg-transparent text-2xl text-gray-500 font-medium tracking-wide text-center w-full focus:outline-none pt-2" value={boardData.author} onChange={(e) => handleTitleChange(e, 'author')} />
                                )}
                            </div>

                            <div className="w-full grid grid-cols-5 gap-3">
                                {gridItems.map((item) => (
                                    <div key={item.id} className="flex flex-col border-2 border-gray-100 rounded-lg overflow-hidden bg-white shadow-sm hover:shadow-md transition-shadow group">
                                        <div onClick={() => openSearchModal(item.id)} className="aspect-square bg-[#f8f9fa] flex items-center justify-center relative cursor-pointer group/cover overflow-hidden transition-colors">
                                            {item.musicData ? (
                                                <>
                                                <img src={item.musicData.cover} className="absolute inset-0 w-full h-full object-cover transition-transform duration-500 group-hover/cover:scale-110" crossOrigin="anonymous" />
                                                
                                               
                                                <div 
                                                    className="absolute inset-0 w-full h-full z-10 pointer-events-none" 
                                                    style={{ background: 'linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.5) 20%, rgba(0,0,0,0) 45%)' }}
                                                ></div>
                                                
                                                <div className="absolute bottom-0 left-0 w-full px-3 pb-3 z-10 pointer-events-none">
                                                    <div className="text-white text-base font-bold truncate drop-shadow-md pb-1">
                                                        {item.musicData.title}
                                                    </div>
                                                    <div className="text-gray-300 text-sm truncate drop-shadow-md pb-1">
                                                        {item.musicData.artist}
                                                    </div>
                                                </div>

                                                <div data-html2canvas-ignore className="absolute inset-0 bg-black/60 opacity-0 group-hover/cover:opacity-100 transition-all duration-300 z-20 flex items-center justify-center gap-3 backdrop-blur-sm">
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); openSearchModal(item.id); }} 
                                                        className="bg-white/20 hover:bg-white text-white hover:text-black font-bold py-2 px-4 rounded-full transition-colors text-sm shadow-md"
                                                    >
                                                        更换
                                                    </button>
                                                    <button 
                                                        onClick={(e) => handleRemoveMusic(item.id, e)} 
                                                        className="bg-red-500/80 hover:bg-red-500 text-white font-bold py-2 px-4 rounded-full transition-colors text-sm shadow-md"
                                                    >
                                                        删除
                                                    </button>
                                                </div>
                                                </>
                                            ) : (
                                                <svg className="w-16 h-16 text-gray-300 group-hover/cover:text-gray-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.2" d="M12 4v16m8-8H4"></path></svg>
                                            )}
                                        </div>
                                        
                                        <div className="h-16 flex items-center justify-center px-2 bg-white relative w-full">
                                            {isExporting ? (
                                                <div className="text-xl font-bold tracking-wide text-center text-gray-700 w-full truncate px-1 pt-1 pb-2.5 leading-relaxed">
                                                    {item.subTitle}
                                                </div>
                                            ) : (
                                                <input 
                                                    className="bg-transparent text-xl font-bold tracking-wide text-center text-gray-700 w-full hover:bg-gray-50 focus:bg-gray-100 py-1.5 rounded transition-colors z-10" 
                                                    value={item.subTitle} 
                                                    onChange={(e) => handleSubTitleChange(item.id, e.target.value)} 
                                                />
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="w-full mt-12 pt-10 border-t-2 border-gray-100 flex justify-between items-center text-left select-none pb-4">
                                <div className="flex items-center gap-6">
                                    {/* 💡 二维码框调到了黄金尺寸 140px，兼顾扫码与美感 */}
                                    <div className="w-[140px] h-[140px] bg-white border-2 border-gray-100 p-2.5 rounded-2xl shadow-sm flex items-center justify-center flex-shrink-0">
                                        {qrSrc && <img src={qrSrc} alt="QR Code" className="w-full h-full object-contain" />}
                                    </div>
                                    <div className="flex flex-col justify-center">
                                        <span className="text-gray-800 font-black text-[1.4rem] tracking-wider mb-2">长按扫码，生成专属表单</span>
                                        <span className="text-gray-400 font-bold text-[1rem] tracking-widest font-mono">www.turin-musicboard.fun</span>
                                    </div>
                                </div>
                                <div className="text-right flex flex-col justify-end">
                                    <span className="text-gray-400 font-black text-2xl tracking-widest mb-2">我的音乐喜好表</span>
                                    <span className="text-gray-300 font-bold text-base tracking-widest">分享你的音乐人生</span>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div className="mt-12 flex flex-col items-center gap-6 text-center" data-html2canvas-ignore>
                        
                        <button onClick={handleExportImage} disabled={isExporting} className="bg-black hover:bg-gray-800 text-white font-bold py-4 px-12 rounded-full shadow-[0_10px_30px_rgba(0,0,0,0.2)] transform hover:scale-105 transition-all text-lg flex items-center justify-center gap-2 border-2 border-white min-w-[240px]">
                            {isExporting ? '处理画面中...' : '导出高清图片'}
                        </button>

                        <div className="flex flex-col items-center gap-3 px-4">
                            <div className="text-gray-500 text-xs md:text-sm font-medium tracking-wide space-y-1">
                                <p>点击上方主标题和各个小标题，即可修改为个人专属内容哦！</p>
                                <p>注：因接入iTunes数据源，极少部分歌曲可能暂未收录，敬请谅解。</p>
                            </div>
                            <div className="text-gray-400 text-xs md:text-sm font-medium tracking-wide space-y-1">
                                <p>Powered by iTunes</p>
                                <p>@Maxwell's Silver Hammer</p>
                            </div>

                            <div className="mt-2 flex justify-center hover:opacity-80 transition-opacity">
                                <a href="https://hits.sh/www.turin-musicboard.fun/" target="_blank" rel="noopener noreferrer" title="网站总访问量">
                                    <img 
                                        alt="Hits" 
                                        src="https://hits.sh/www.turin-musicboard.fun.svg?style=flat&label=VISITS&color=000000&labelColor=555555" 
                                        className="h-6 rounded-sm shadow-sm" 
                                    />
                                </a>
                            </div>
                        </div>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/60 flex justify-center items-center z-50 p-4 backdrop-blur-sm" data-html2canvas-ignore>
                            <div className="bg-white w-full max-w-md rounded-2xl border border-gray-200 shadow-2xl overflow-hidden flex flex-col">
                                
                                <div className="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                                    <h3 className="text-xl font-black text-black flex items-center gap-2">
                                        填入你想展示的内容
                                    </h3>
                                    <button onClick={closeSearchModal} className="text-gray-400 hover:text-black text-3xl leading-none font-light">&times;</button>
                                </div>

                                <div className="flex border-b border-gray-200 bg-white">
                                    <button onClick={() => {setSearchType('song'); setSearchResults([]);}} className={`flex-1 py-3 font-bold text-sm transition-colors ${searchType === 'song' ? 'bg-black text-white' : 'text-gray-500 hover:bg-gray-100'}`}>搜单曲</button>
                                    <button onClick={() => {setSearchType('album'); setSearchResults([]);}} className={`flex-1 py-3 font-bold text-sm transition-colors border-l border-r border-gray-200 ${searchType === 'album' ? 'bg-black text-white' : 'text-gray-500 hover:bg-gray-100'}`}>搜专辑</button>
                                    <button onClick={() => {setSearchType('local'); setSearchResults([]);}} className={`flex-1 py-3 font-bold text-sm transition-colors ${searchType === 'local' ? 'bg-black text-white' : 'text-gray-500 hover:bg-gray-100'}`}>自定义</button>
                                </div>

                                {searchType === 'local' ? (
                                    <div className="p-6 flex flex-col gap-4 bg-white overflow-y-auto max-h-[400px]">
                                        <div className="flex flex-col items-center gap-3 mb-2">
                                            {localImageStr ? (
                                                <img src={localImageStr} className="w-32 h-32 object-cover rounded-xl border border-gray-200 shadow-md" />
                                            ) : (
                                                <div className="w-32 h-32 bg-gray-50 border-2 border-dashed border-gray-300 rounded-xl flex flex-col items-center justify-center text-gray-400 text-sm gap-2">
                                                    <span className="text-2xl">📸</span>
                                                    <span>点击下方选图</span>
                                                </div>
                                            )}
                                            <input type="file" accept="image/*" onChange={handleLocalUpload} className="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-black file:text-white hover:file:bg-gray-800 cursor-pointer w-full"/>
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-xs text-gray-500">主标题 (如歌手名/电影名)</label>
                                            <input type="text" value={localTitle} onChange={e => setLocalTitle(e.target.value)} className="bg-gray-50 border border-gray-200 p-3 rounded-xl text-base font-bold focus:bg-white transition-colors" placeholder="输入名称..." />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-xs text-gray-500">副标题 (可选，如年份/备注)</label>
                                            <input type="text" value={localArtist} onChange={e => setLocalArtist(e.target.value)} className="bg-gray-50 border border-gray-200 p-3 rounded-xl text-base focus:bg-white transition-colors" placeholder="输入备注..." />
                                        </div>
                                        <button onClick={submitLocal} className="w-full bg-black text-white font-bold py-3 rounded-xl hover:bg-gray-800 mt-2 transition-transform transform hover:scale-[1.02]">确认填入网格</button>
                                    </div>
                                ) : (
                                    <div className="flex flex-col flex-1">
                                        <div className="p-4 flex gap-2 bg-gray-50 border-b border-gray-200">
                                            <input type="text" className="flex-1 bg-white text-black text-base font-bold rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-gray-300 border border-gray-200 shadow-inner" placeholder={`输入${searchType === 'song' ? '单曲' : '专辑'}名称...`} value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSearch()} />
                                            <button onClick={handleSearch} disabled={isSearching} className="bg-black hover:bg-gray-800 disabled:bg-gray-400 text-white font-bold px-6 py-3 rounded-xl transition-colors min-w-[80px]">{isSearching ? '...' : '搜索'}</button>
                                        </div>
                                        <div className="p-2 flex-1 overflow-y-auto max-h-80 space-y-1 bg-white">
                                            {searchResults.length === 0 && !isSearching ? (
                                                <div className="text-center text-gray-400 py-12 font-bold">快来搜索你心目中的{searchType === 'song' ? '神曲' : '神专'}吧！</div>
                                            ) : (
                                                searchResults.map((result, idx) => (
                                                    <div key={idx} onClick={() => handleSelectMusic(result)} className="flex items-center gap-4 p-3 hover:bg-gray-100 rounded-xl cursor-pointer transition-colors border border-transparent">
                                                        <img src={result.cover} className="w-14 h-14 rounded-md object-cover border border-gray-200 shadow-sm" crossOrigin="anonymous" />
                                                        <div className="flex flex-col overflow-hidden">
                                                            <span className="text-black font-extrabold truncate">{result.title}</span>
                                                            <span className="text-gray-500 text-sm font-bold truncate">{result.artist}</span>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
